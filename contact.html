<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact XE-AR</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
            <div class="contact-left-title">
                <h2>Get in touch !!</h2>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="60335b28-2e99-4625-bcac-b70bad945cce">
            <input type="text" name="name" placeholder="Your Name" class="contact-inputs" required>
            <input type="email" name="email" placeholder="Your Email" class="contact-inputs" required>
            <textarea name="message" placeholder="Your Message" class="contact-inputs" required></textarea>
            <button type="submit">Submit</button>
            <a href="index.html"><h3><script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script> 

            <dotlottie-player src="https://lottie.host/d86df5c7-3b6e-4d59-bab2-7e576baab86b/Lhaak8Cljh.json" background="transparent" speed="1" style="width: 75px; height: 75px;" loop autoplay></dotlottie-player></h3></a>
        </form>
        <div class="contact-right">
            <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script><lottie-player src="https://lottie.host/2c1d5942-8158-4dd8-a200-6628b7c57034/9YYymH7NSP.json" speed="1" style="width: 700px; height: 700px" loop  autoplay direction="1" mode="normal" ></lottie-player>
        </div>
    </div>
</body>
</html>
